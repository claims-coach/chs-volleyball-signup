<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bruins Volleyball — Dinner Sign-Up</title>
  <style>
    body{font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;padding:24px;max-width:760px;margin:0 auto;background:#0f1216;color:#e9ecf1}
    h1{margin:0 0 10px}
    small{color:#9aa3ad}
    form, .panel{background:#141a22;border:1px solid #202734;border-radius:14px;padding:16px 18px;margin:16px 0}
    label{display:block;margin:12px 0 6px}
    input,textarea,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #2a3342;background:#0e131a;color:#e9ecf1}
    button{padding:10px 14px;border-radius:10px;border:1px solid #2a3342;background:#1b2533;color:#e9ecf1;cursor:pointer}
    button[disabled]{opacity:.6;cursor:not-allowed}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .ok{color:#86efac}.bad{color:#fda4af}
    code{background:#0e131a;border:1px solid #2a3342;padding:2px 6px;border-radius:6px}
    ul{margin:8px 0 0 18px}
  </style>
</head>
<body>

  <h1>Dinner Sign-Up</h1>
  <small>Enter the game/date and your contact info. No logos. No fuss.</small>

  <div class="panel">
    <strong>Current Sign-Ups</strong>
    <div id="list">Loading…</div>
  </div>

  <form id="signupForm">
    <div class="row">
      <div>
        <label for="id">Game/Date (ID) *</label>
        <input id="id" name="id" placeholder="2025-09-18 or Home-Game-9/18" required />
      </div>
      <div>
        <label for="label">Friendly Label (optional)</label>
        <input id="label" name="label" placeholder="Sept 18 Home Game" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="name">Your Name *</label>
        <input id="name" name="name" required />
      </div>
      <div>
        <label for="email">Email *</nlabel>
        <input id="email" name="email" type="email" required />
      </div>
    </div>

    <label for="phone">Phone</label>
    <input id="phone" name="phone" placeholder="optional" />

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="3" placeholder="Dish, allergies, etc."></textarea>

    <div style="margin-top:14px;display:flex;gap:10px;align-items:center">
      <button id="submitBtn" type="submit">Sign Me Up</button>
      <span id="msg"></span>
    </div>
  </form>

  <script>
    // Apps Script /exec URL
    const GAS_BASE = "https://script.google.com/macros/s/AKfycbzUkKzACCw6lnToG8xiHGj4XeXsA0aEOUFuFJ-yWphoBnRG_2JU463EkA15PofSPKW6/exec";

    const $ = (id) => document.getElementById(id);
    const listEl = $("list"), form = $("signupForm"), btn = $("submitBtn"), msg = $("msg");

    async function loadList(){
      try{
        const res = await fetch(`${GAS_BASE}?action=list`, { method: "GET" });
        const json = await res.json();
        let data = {};
        if (json && typeof json === 'object' && Object.prototype.hasOwnProperty.call(json, 'ok')) {
          if(!json.ok) throw new Error(json.error || "Failed to load list");
          data = json.data || {};
        } else {
          data = json || {};
        }
        const items = Object.keys(data).sort().map(id => {
          const r = data[id] || {};
          const who = r.name ? `${r.name} (${r.email || ''})` : "(empty)";
          return `<li><code>${id}</code> — ${who}${r.notes ? ` — ${r.notes}` : ""}</li>`;
        });
        listEl.innerHTML = items.length ? `<ul>${items.join("")}</ul>` : "<em>No sign-ups yet.</em>";
      }catch(err){
        listEl.innerHTML = `<span class="bad">Error loading list: ${String(err)}</span>`;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      btn.disabled = true;
      const payload = {
        id: $("id").value.trim(),
        label: $("label").value.trim(),
        name: $("name").value.trim(),
        email: $("email").value.trim(),
        phone: $("phone").value.trim(),
        notes: $("notes").value.trim()
      };
      try{
        const res = await fetch(GAS_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        if(json.ok){
          msg.textContent = "✅ Confirmed!";
          msg.className = "ok";
          form.reset();
          await loadList();
        }else{
          msg.textContent = `❌ ${json.error || "Failed"}`;
          msg.className = "bad";
        }
      }catch(err){
        msg.textContent = `❌ ${String(err)}`;
        msg.className = "bad";
      }finally{
        btn.disabled = false;
      }
    });

    loadList();
  </script>
</body>
</html>
